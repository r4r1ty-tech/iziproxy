name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Android Workload
      run: dotnet workload install android

    - name: Publish Android APK
      run: |
        dotnet publish IziProxy.GUI/IziProxy.GUI.Android/IziProxy.GUI.Android.csproj `
          -c Release `
          -f net10.0-android `
          -p:AndroidPackageFormat=apk

    - name: Find and rename APK
      run: |
        $outDir = "IziProxy.GUI/IziProxy.GUI.Android/bin/Release/net10.0-android"

        # Предпочитаем подписанный APK, иначе любой
        $apk = Get-ChildItem -Path $outDir -Recurse -Filter "*-Signed.apk" | Select-Object -First 1
        if (-not $apk) {
          $apk = Get-ChildItem -Path $outDir -Recurse -Filter "*.apk" | Select-Object -First 1
        }

        if ($apk) {
          Write-Host "Найден APK: $($apk.FullName)"
          Copy-Item $apk.FullName "IziProxy.apk"
        } else {
          Write-Host "Содержимое директории:"
          Get-ChildItem -Path $outDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          Write-Error "APK не найден!"
          exit 1
        }

    - name: Upload APK to Release v1.0.2
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
      run: |
        gh release upload v1.0.2 IziProxy.apk --clobber

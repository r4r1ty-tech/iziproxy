name: Release v1.0.2

on:
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────
  # 1. Windows x86 — один EXE, self-contained
  # ────────────────────────────────────────────────
  build-windows-x86:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows x86
        run: |
          dotnet publish IziProxy.GUI/IziProxy.GUI.Desktop/IziProxy.GUI.Desktop.csproj `
            -c Release `
            -r win-x86 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o publish_win_x86

      - name: Rename EXE
        run: Rename-Item publish_win_x86\IziProxy.GUI.Desktop.exe IziProxy-win-x86.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x86
          path: publish_win_x86\IziProxy-win-x86.exe

  # ────────────────────────────────────────────────
  # 2. Windows ARM64 — один EXE, self-contained
  # ────────────────────────────────────────────────
  build-windows-arm64:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows ARM64
        run: |
          dotnet publish IziProxy.GUI/IziProxy.GUI.Desktop/IziProxy.GUI.Desktop.csproj `
            -c Release `
            -r win-arm64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o publish_win_arm64

      - name: Rename EXE
        run: Rename-Item publish_win_arm64\IziProxy.GUI.Desktop.exe IziProxy-win-arm64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64
          path: publish_win_arm64\IziProxy-win-arm64.exe

  # ────────────────────────────────────────────────
  # 3. Linux x64 — AppImage, self-contained
  # ────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Linux x64
        run: |
          dotnet publish IziProxy.GUI/IziProxy.GUI.Desktop/IziProxy.GUI.Desktop.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -o publish_linux

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp publish_linux/IziProxy.GUI.Desktop AppDir/usr/bin/IziProxy
          chmod +x AppDir/usr/bin/IziProxy

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/IziProxy" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/IziProxy.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=IziProxy
          Exec=IziProxy
          Icon=iziproxy
          Categories=Network;
          EOF

          cat > AppDir/iziproxy.svg << 'EOF'
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="40" fill="#6200EA" />
          </svg>
          EOF

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun AppDir IziProxy-Linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: IziProxy-Linux-x86_64.AppImage

  # ────────────────────────────────────────────────
  # 4. Android APK
  # ────────────────────────────────────────────────
  build-android:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Android Workload
        run: dotnet workload install android

      - name: Publish Android APK
        run: |
          dotnet publish IziProxy.GUI/IziProxy.GUI.Android/IziProxy.GUI.Android.csproj `
            -c Release `
            -f net10.0-android `
            -p:AndroidPackageFormat=apk

      - name: Find APK and stage it
        run: |
          $apk = Get-ChildItem -Path "IziProxy.GUI/IziProxy.GUI.Android/bin/Release/net10.0-android/" -Recurse -Filter "*-Signed.apk" | Select-Object -First 1
          if (-not $apk) {
            $apk = Get-ChildItem -Path "IziProxy.GUI/IziProxy.GUI.Android/bin/Release/net10.0-android/" -Recurse -Filter "*.apk" | Select-Object -First 1
          }
          if ($apk) {
            Copy-Item $apk.FullName "IziProxy.apk"
          } else {
            Write-Error "APK not found!"; exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: IziProxy.apk

  # ────────────────────────────────────────────────
  # 5. Создаём релиз и загружаем все артефакты
  # ────────────────────────────────────────────────
  publish-release:
    needs: [build-windows-x86, build-windows-arm64, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create v1.0.2 \
            --title "IziProxy v1.0.2" \
            --notes "## IziProxy v1.0.2

          ### Исправления
          - Скрипты VDS_setup встроены прямо в exe (EmbeddedResource) — никаких файлов рядом не нужно
          - Обновлены правила маршрутизации: 43 популярных RU-домена в direct-bypass

          ### Загрузки
          | Платформа | Файл |
          |-----------|------|
          | Windows x86 | IziProxy-win-x86.exe |
          | Windows ARM64 | IziProxy-win-arm64.exe |
          | Linux x64 | IziProxy-Linux-x86_64.AppImage |
          | Android | IziProxy.apk |" \
            artifacts/win-x86/IziProxy-win-x86.exe \
            artifacts/win-arm64/IziProxy-win-arm64.exe \
            artifacts/linux-appimage/IziProxy-Linux-x86_64.AppImage \
            artifacts/android-apk/IziProxy.apk
